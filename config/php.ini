; ────────────────────────────────────────────────────────────────
; WordPress Production PHP Configuration
; Located at /usr/local/etc/php/conf.d/zz-custom.ini
; Loads last to override any distribution defaults.
; ────────────────────────────────────────────────────────────────

; ── Resource Limits ─────────────────────────────────────────────
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; ── Uploads ─────────────────────────────────────────────────────
upload_max_filesize = 512M
post_max_size = 512M

; ── Error Handling ──────────────────────────────────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Date & Time ─────────────────────────────────────────────────
date.timezone = UTC

; ── Security ────────────────────────────────────────────────────
expose_php = Off
session.cookie_httponly = On
session.use_strict_mode = On
session.use_only_cookies = On
allow_url_fopen = On
allow_url_include = Off

; ── File Handling ───────────────────────────────────────────────
file_uploads = On

; ── MySQL ───────────────────────────────────────────────────────
mysqli.default_socket = /var/run/mysqld/mysqld.sock

; ── OPcache note ────────────────────────────────────────────────
; OPcache is configured in zz-opcache.ini (loaded after this file).
